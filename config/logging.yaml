# loguru configuration — loaded programmatically by common/logger.py
# Actual config is in settings.yaml logging section

handlers:
  console:
    enabled: true
    format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"
    level: INFO

  file:
    enabled: true
    path: logs/que.log
    rotation: 100 MB
    retention: 30 days
    compression: gz
    format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"
    level: DEBUG
