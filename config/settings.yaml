# QUE Engine Configuration
# Environment variables use ${VAR:default} syntax

grpc:
  port: ${GRPC_QUE_PORT:50055}
  max_workers: 10

clients:
  rag_python:
    host: ${GRPC_RETRIEVAL_HOST:localhost}
    port: ${GRPC_RETRIEVAL_PORT:50051}
    timeout: 30
  rag_memory:
    host: ${GRPC_MEMORY_HOST:localhost}
    port: ${GRPC_MEMORY_SEARCH_PORT:50054}
    timeout: 10

llm:
  api_key: ${LLM_API_KEY:}
  base_url: ${LLM_BASE_URL:}
  chat_model: ${CHAT_MODEL:gpt-4o-mini}
  embedding_model: ${EMBEDDING_MODEL:text-embedding-3-small}
  timeout: 60

engine:
  max_sub_queries: 8
  max_dag_depth: 4
  timeout_ms: 30000
  hyde_enabled: true
  multi_query_enabled: true
  cache_ttl: 300
  rule_confidence_threshold: 0.7
  max_workers: 10

logging:
  level: ${LOG_LEVEL:INFO}
  format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"


redis:
  enabled: ${REDIS_ENABLED:false}
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  db: ${REDIS_DB:0}
  password: ${REDIS_PASSWORD:}

pipeline:
  default_preset: icar
  presets:
    icar:
      stages: [intent, rewrite, plan, execute, synthesize]
    retrieval_only:
      stages: [intent, execute, synthesize]
    intent_then_retrieve:
      stages: [intent]

tenants:
  enabled: ${TENANTS_ENABLED:false}
  config_path: ${TENANTS_CONFIG_PATH:config/tenants.yaml}
  default:
    max_qps: 100
    max_sub_queries: 8
    timeout_ms: 30000

backends_config:
  auto_register: true
  health_check_interval: 15
  backends:
    - name: rag_retrieval
      type: rag_retrieval
      enabled: true
    - name: direct_llm
      type: llm
      enabled: true
    - name: memory_lookup
      type: memory
      enabled: true

kafka:
  enabled: ${KAFKA_ENABLED:false}
  bootstrap_servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  request_topic: ${KAFKA_REQUEST_TOPIC:que.requests}
  consumer_group: ${KAFKA_CONSUMER_GROUP:que-consumer}

telemetry:
  tracing:
    enabled: ${OTEL_ENABLED:false}
    service_name: ${OTEL_SERVICE_NAME:que-engine}
    otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
