syntax = "proto3";

package que.v2;

option java_multiple_files = true;
option java_package = "com.rag.communication.grpc.proto.que.v2";

// ==================== QUE Engine Service ====================

service QueEngineService {
  rpc Execute(QueRequest) returns (QueResponse);
  rpc ExecuteStream(QueRequest) returns (stream QueStreamEvent);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc ListBackends(ListBackendsRequest) returns (ListBackendsResponse);
}

// ==================== Request ====================

message QueRequest {
  string query = 1;
  map<string, string> context = 2;   // tenant, kb_ids, user_id, session_id, etc.
  map<string, string> params = 3;    // passthrough params
  int32 max_sub_queries = 4;
  int32 timeout_ms = 5;
  bool enable_hyde = 6;
  bool enable_multi_query = 7;
  repeated BackendHint backend_hints = 8;
}

message BackendHint {
  string backend_name = 1;
  float weight = 2;
}

// ==================== Response ====================

message QueResponse {
  string original_query = 1;
  repeated string rewritten_queries = 2;
  DAGPlan plan = 3;
  repeated SubQueryResult sub_results = 4;
  string synthesized_context = 5;
  ExecutionTrace trace = 6;
  float total_latency_ms = 7;
  repeated BackendUsage backend_usage = 8;
}

message BackendUsage {
  string backend_name = 1;
  int32 call_count = 2;
  float total_latency_ms = 3;
}

// ==================== DAG Plan ====================

message DAGPlan {
  repeated QueSubQuery sub_queries = 1;
  int32 parallel_waves = 2;
  int32 total_queries = 3;
  string complexity_level = 4;
  string primary_intent = 5;
}

message QueSubQuery {
  string query_id = 1;
  string query_text = 2;
  string route = 3;
  repeated string dependency_ids = 4;
  int32 parallel_group = 5;
}

// ==================== Sub-Query Result ====================

message SubQueryResult {
  string query_id = 1;
  string query_text = 2;
  string route = 3;
  repeated SearchResult results = 4;    // generic, not DocumentChunk
  string direct_answer = 5;
  float latency_ms = 6;
  bool success = 7;
  string error = 8;
}

// ==================== Generic Search Result ====================

message SearchResult {
  string id = 1;
  string content = 2;
  map<string, string> metadata = 3;     // extensible: document_name, source, chunk_index, etc.
  float score = 4;
  string source_backend = 5;
}

// ==================== Execution Trace ====================

message ExecutionTrace {
  repeated TraceEntry entries = 1;
}

message TraceEntry {
  string stage = 1;
  string description = 2;
  float latency_ms = 3;
  map<string, string> metadata = 4;
}

// ==================== Stream Events ====================

message QueStreamEvent {
  string event_type = 1;
  string stage = 2;
  string message = 3;
  float progress_pct = 4;
  oneof payload {
    QueResponse final_response = 10;
    string chunk_content = 11;
  }
}

// ==================== Health Check ====================

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  repeated BackendHealth backend_health = 2;
  string llm_status = 3;
}

message BackendHealth {
  string backend_name = 1;
  string status = 2;       // healthy, unhealthy, unreachable
}

message ListBackendsRequest {}

message ListBackendsResponse {
  repeated BackendInfo backends = 1;
}

message BackendInfo {
  string name = 1;
  repeated string capabilities = 2;
  string status = 3;
}
