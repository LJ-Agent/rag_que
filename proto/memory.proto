syntax = "proto3";

package com.rag.grpc;

option java_multiple_files = true;
option java_package = "com.rag.communication.grpc.proto";

// ==================== Memory Write Service ====================

service MemoryWriteService {
  rpc CaptureConversation(CaptureConversationRequest) returns (CaptureConversationResponse);
  rpc IngestTaskResult(IngestTaskResultRequest) returns (CaptureConversationResponse);
}

// ==================== Memory Search Service ====================

service MemorySearchService {
  rpc Search(MemorySearchRequest) returns (MemorySearchResponse);
  rpc GetSessionContext(MemorySearchRequest) returns (MemorySearchResponse);
  rpc GetWorkingMemory(GetMemoryStatsRequest) returns (MemorySearchResponse);
}

// ==================== Memory Admin Service ====================

service MemoryAdminService {
  rpc GetStats(GetMemoryStatsRequest) returns (GetMemoryStatsResponse);
  rpc EvictWorkingMemory(EvictWorkingMemoryRequest) returns (EvictWorkingMemoryResponse);
  rpc CreateSnapshot(GetMemoryStatsRequest) returns (CaptureConversationResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ==================== Memory Compliance Service ====================

service MemoryComplianceService {
  rpc GetExportableData(GetExportableDataRequest) returns (GetExportableDataResponse);
  rpc ForgetUser(ForgetUserRequest) returns (ForgetUserResponse);
}

// ==================== Common Messages ====================

message UserInfo {
  int64 user_id = 1;
}

message ContextBlock {
  string role = 1;
  string content = 2;
  int64 timestamp_ms = 3;
  map<string, string> metadata = 4;
}

message SessionConversation {
  string session_id = 1;
  repeated ContextBlock messages = 2;
}

message SourceReference {
  string document_id = 1;
  string document_name = 2;
  string chunk_id = 3;
  string excerpt = 4;
}

message AtomicFact {
  string fact_id = 1;
  int64 user_id = 2;
  string session_id = 3;
  string content = 4;
  string category = 5;
  float importance = 6;
  repeated string tags = 7;
  repeated SourceReference sources = 8;
  int64 created_at_ms = 9;
  int64 accessed_at_ms = 10;
  int32 access_count = 11;
}

message EpisodicSummary {
  string episode_id = 1;
  int64 user_id = 2;
  string session_id = 3;
  string summary = 4;
  string period = 5;
  repeated string key_fact_ids = 6;
  int64 start_time_ms = 7;
  int64 end_time_ms = 8;
  int64 created_at_ms = 9;
}

message ProceduralRule {
  string rule_id = 1;
  int64 user_id = 2;
  string rule_content = 3;
  string category = 4;
  repeated string supporting_fact_ids = 5;
  float confidence = 6;
  int32 activation_count = 7;
  int64 created_at_ms = 8;
  int64 last_activated_ms = 9;
}

message WorkingMemoryEntry {
  string entry_id = 1;
  int64 user_id = 2;
  string session_id = 3;
  string key = 4;
  string value = 5;
  int64 ttl_seconds = 6;
  int64 created_at_ms = 7;
}

message MemorySearchResult {
  repeated AtomicFact facts = 1;
  repeated EpisodicSummary episodes = 2;
  repeated ProceduralRule rules = 3;
  repeated WorkingMemoryEntry working_entries = 4;
  float total_latency_ms = 5;
}

// ==================== Write Messages ====================

enum ArchivePolicy {
  STANDARD = 0;
  IMMEDIATE = 1;
  COMPACTED = 2;
}

message DistillationConfig {
  bool enable_pii_detection = 1;
  float importance_threshold = 2;
  int32 max_facts_per_batch = 3;
  string model_override = 4;
}

message CaptureConversationRequest {
  int64 user_id = 1;
  SessionConversation conversation = 2;
  DistillationConfig config = 3;
}

message CaptureConversationResponse {
  int32 extracted_facts = 1;
  string status = 2;
}

message IngestTaskResultRequest {
  int64 task_id = 1;
  string task_type = 2;
  string status = 3;
  repeated AtomicFact facts = 4;
  string error_message = 5;
}

// ==================== Search Messages ====================

message MemorySearchRequest {
  int64 user_id = 1;
  string query = 2;
  repeated string categories = 3;
  int32 top_k = 4;
  float score_threshold = 5;
  int64 time_range_start_ms = 6;
  int64 time_range_end_ms = 7;
}

message MemorySearchResponse {
  MemorySearchResult result = 1;
}

// ==================== Admin Messages ====================

message GetMemoryStatsRequest {
  int64 user_id = 1;
}

message MemoryStats {
  int32 working_entry_count = 1;
  int32 atomic_fact_count = 2;
  int32 episodic_summary_count = 3;
  int32 procedural_rule_count = 4;
  int64 total_vector_count = 5;
  double avg_fact_importance = 6;
}

message GetMemoryStatsResponse {
  MemoryStats stats = 1;
}

message EvictWorkingMemoryRequest {
  int64 user_id = 1;
  string session_id = 2;
}

message EvictWorkingMemoryResponse {
  int32 evicted_count = 1;
}

// ==================== Compliance Messages ====================

message GetExportableDataRequest {
  int64 user_id = 1;
  int64 start_time_ms = 2;
  int64 end_time_ms = 3;
}

message ExportableData {
  repeated AtomicFact facts = 1;
  repeated EpisodicSummary episodes = 2;
  repeated ProceduralRule rules = 3;
  repeated WorkingMemoryEntry working = 4;
}

message GetExportableDataResponse {
  ExportableData data = 1;
}

message ForgetUserRequest {
  int64 user_id = 1;
}

message ForgetUserResponse {
  bool success = 1;
  int32 deleted_fact_count = 2;
  int32 deleted_episode_count = 3;
  int32 deleted_rule_count = 4;
  int32 deleted_vector_count = 5;
}

// ==================== Health Check ====================

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string mysql_status = 2;
  string milvus_status = 3;
  string redis_status = 4;
  string llm_status = 5;
}
