syntax = "proto3";

package com.rag.grpc;

option java_multiple_files = true;
option java_package = "com.rag.communication.grpc.proto";

service RetrievalService {
  rpc Retrieve(RetrievalRequest) returns (RetrievalResponse);
}

message RetrievalRequest {
  string query = 1;
  repeated int64 kb_ids = 2;
  int32 top_k = 3;
  float score_threshold = 4;
  map<string, string> params = 5;
}

message RetrievalResponse {
  repeated DocumentChunk chunks = 1;
  int64 total_count = 2;
  int64 latency_ms = 3;
}

message DocumentChunk {
  string chunk_id = 1;
  int64 document_id = 2;
  string document_name = 3;
  string content = 4;
  float score = 5;
  int32 chunk_index = 6;
}
